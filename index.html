<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AQUA Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <img src="logo.png" class="logo" alt="AQUA">

    <h2>AQUA</h2>

    <a id="addBotBtn" class="btn green">➕ Adicionar Bot</a>

    <button id="logoutBtn" class="btn red">Terminar sessão</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <div id="userBox"></div>

      <a id="loginBtn" class="btn blue">Login Discord</a>
    </header>

    <!-- CONTENT -->
    <section class="content">

      <!-- SERVIDORES -->
      <h2>Servidores</h2>
      <div id="guilds" class="grid"></div>

      <p id="guildCount"></p>

      <!-- CONFIG WELCOME -->
      <h2>Boas-Vindas</h2>

      <div class="panel">

        <label>Ativar boas-vindas</label>
        <input type="checkbox" id="welcomeToggle">

        <label>ID do canal</label>
        <input type="text" id="welcomeChannel" placeholder="Ex: 123456789">

        <label>Mensagem</label>
        <input type="text" id="welcomeMsg" placeholder="Bem-vindo {user} ao {server}">

        <button id="saveWelcome" class="btn green">Guardar Configuração</button>

      </div>

      <!-- SERVIDOR SELECIONADO -->
      <h2>Servidor selecionado</h2>

      <div class="info">
        <p><b>Nome:</b> <span id="selectedGuildName">Nenhum</span></p>
        <p><b>ID:</b> <span id="selectedGuildId">-</span></p>
        <p id="syncedState">Estado: aguardando seleção</p>
      </div>

      <!-- CANAIS -->
      <h2>Canais</h2>
      <div id="channels"></div>

      <!-- CARGOS -->
      <h2>Cargos</h2>
      <div id="roles"></div>

    </section>

  </main>

</div>

<script type="module" src="script.js"></script>

</body>
        </html>
