<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AQUA Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <img src="logo.png" class="logo" alt="Logo do AQUA" />
      <h2>AQUA</h2>

      <a
        id="addBotBtn"
        class="add-bot"
        href="https://discord.com/oauth2/authorize?client_id=1403419829435760662&scope=bot%20applications.commands&permissions=8"
        target="_blank"
        rel="noreferrer"
      >
        ➕ Adicionar Bot
      </a>

      <button id="logoutBtn" class="logout" type="button">Terminar sessão</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <span class="badge">Dashboard</span>
        </div>

        <div id="userBox" class="user-box"></div>
      </header>

      <section class="content">
        <div class="hero">
          <img src="Novo_Projeto.webp" class="character" alt="Personagem do AQUA" />
          <div class="hero-text">
            <h1>Dashboard AQUA</h1>
            <p>Gerir servidores, canais e cargos pelo Firebase</p>
            <a id="loginBtn" class="btn" href="#">Login com Discord</a>
          </div>
        </div>

        <div class="section-head">
          <h2>Servidores</h2>
          <span id="guildCount" class="muted"></span>
        </div>
        <div id="guilds" class="grid"></div>

        <div class="panels">
          <div class="panel">
            <div class="panel-head">
              <div>
                <h2 id="selectedGuildName">Seleciona um servidor</h2>
                <span id="selectedGuildId" class="muted"></span>
              </div>
              <span id="syncedState" class="muted">Os canais e cargos vêm do Firebase.</span>
            </div>

            <div class="panel-columns">
              <div>
                <h3>Canais</h3>
                <div id="channels" class="list"></div>
              </div>

              <div>
                <h3>Cargos</h3>
                <div id="roles" class="list"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
