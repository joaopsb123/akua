<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AQUA Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <img src="logo.png" class="logo">
    <h2>AQUA</h2>

    <a id="addBotBtn" class="add-bot">➕ Adicionar Bot</a>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <div id="userBox"></div>
    </div>

    <div class="content">

      <!-- PERSONAGEM -->
      <div class="hero">
        <img src="Novo_Projeto.webp" class="character">
        <div>
          <h1>Dashboard AQUA</h1>
          <p>Gerencia o teu bot facilmente</p>
        </div>
      </div>

      <a id="loginBtn" class="btn">Login com Discord</a>

      <h2>Servidores</h2>
      <div id="guilds" class="grid"></div>

      <h2>Canais (simulado)</h2>
      <div id="channels" class="grid small"></div>

      <h2>Cargos (simulado)</h2>
      <div id="roles" class="grid small"></div>

    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
